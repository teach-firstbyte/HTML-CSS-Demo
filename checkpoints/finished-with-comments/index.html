<!DOCTYPE html>
<html lang="en">

<!--
  ============================================================
  HEAD SECTION
  This section sets up the page but is NOT visible to the user.
  Think of it as the "settings" for the page.
  ============================================================
-->
<head>
  <!-- Tells the browser what kind of characters to use (supports all languages) -->
  <meta charset="UTF-8" />

  <!-- Makes the page look good on phones and tablets, not just desktop -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- The text that shows up on the browser tab -->
  <title>Health Habits</title>

  <!-- Links our separate CSS file so the page gets styled nicely -->
  <link rel="stylesheet" href="style.css" />
</head>

<!--
  ============================================================
  BODY SECTION
  Everything inside <body> is what the user actually SEES.
  We split the page into three main parts:
    1. Header   – app title at the top
    2. Tabs     – "Today" and "My Habits" buttons
    3. Views    – the content that changes when you click a tab
  ============================================================
-->
<body>

  <!-- ── PART 1: HEADER ───────────────────────────────────────
       A logo icon on the left and the app title on the right.
       The logo is drawn using SVG (a way to make shapes in HTML).
  ─────────────────────────────────────────────────────────── -->
  <div class="header">

    <!-- Logo: a small coloured box with a heartbeat-style SVG line inside -->
    <img class="logo" src="../../images/ViTaL_Logo.svg" alt="ViTaL Logo">

    <!-- App title and short description -->
    <div>
      <h1>Health Habits</h1>
      <p class="subtitle">Track your daily wellness routine</p>
    </div>

  </div><!-- end .header -->


  <!-- ── PART 2: TABS ─────────────────────────────────────────
       Two buttons that switch between the "Today" view and the
       "My Habits" view. onclick="switchTab(...)" calls a
       JavaScript function in app.js when the button is clicked.
  ─────────────────────────────────────────────────────────── -->
  <div class="tabs">

    <!-- "Today" tab starts with the "active" class so it looks selected on load -->
    <button class="tab active" id="tab-today" onclick="switchTab('today')">Today</button>

    <!-- "My Habits" tab — not active by default -->
    <button class="tab" id="tab-habits" onclick="switchTab('habits')">My Habits</button>

  </div><!-- end .tabs -->


  <!-- ── PART 3A: TODAY VIEW ──────────────────────────────────
       This card is visible when the "Today" tab is active.
       It shows today's date, a progress bar, and the habit list.
       JavaScript fills in the text and habit items automatically.
  ─────────────────────────────────────────────────────────── -->
  <div class="card" id="view-today">

    <!-- Top row: date on the left, completion % on the right -->
    <div class="today-header">

      <div>
        <!-- JavaScript will write today's date into this heading -->
        <h2 id="today-date-label"></h2>
        <!-- JavaScript will write "X of Y habits completed" here -->
        <p id="today-count" class="subtitle"></p>
      </div>

      <div class="pct-block">
        <!-- JavaScript will update this number (e.g. "60%") -->
        <p class="pct-num" id="today-pct">0%</p>
        <p class="subtitle">complete</p>
      </div>

    </div><!-- end .today-header -->

    <!-- Progress bar: the inner div's width is set by JavaScript -->
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- Empty container — JavaScript inserts each habit item here -->
    <div id="today-list"></div>

  </div><!-- end #view-today -->


  <!-- ── PART 3B: MY HABITS VIEW ──────────────────────────────
       This card is hidden at first (class="card hidden").
       It appears when the user clicks the "My Habits" tab.
       It contains a form to add new habits and a list of
       existing habits below.
  ─────────────────────────────────────────────────────────── -->
  <div class="card hidden" id="view-habits">

    <!-- Form to add a new habit -->
    <div class="add-form">

      <!-- Text input: user types the habit name here -->
      <label class="form-label">Habit Name</label>
      <input
        class="form-input"
        id="habit-input"
        type="text"
        placeholder="e.g., Drink 8 glasses of water"
      />

      <!-- Colour picker: JavaScript fills this row with coloured circles -->
      <label class="form-label">Color</label>
      <div class="colors-row" id="colors-row"></div>

      <!-- Action buttons -->
      <div class="form-actions">
        <!-- Calls addHabit() in app.js to save the new habit -->
        <button class="btn-primary" onclick="addHabit()">Add Habit</button>
        <!-- Calls cancelAdd() in app.js to clear the form -->
        <button class="btn-secondary" onclick="cancelAdd()">Cancel</button>
      </div>

    </div><!-- end .add-form -->

    <!-- Heading above the existing habits list -->
    <h3>Your Habits</h3>

    <!-- Empty container — JavaScript inserts each habit row here -->
    <div id="habits-list"></div>

  </div><!-- end #view-habits -->


  <!-- ── SCRIPT TAG ────────────────────────────────────────────
       This loads our JavaScript file AFTER all the HTML above
       has been read. Putting it at the bottom means the page
       elements exist before the script tries to use them.
  ─────────────────────────────────────────────────────────── -->
  <script src="app.js"></script>

</body>
</html>
